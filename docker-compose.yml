version: "3.9"

services:

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: english_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-english_app}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Spring Boot Backend
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend-core/backend-core
      dockerfile: Dockerfile
    container_name: english_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-english_app}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Python AI Service (Whisper + Scoring)
  # ─────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: english_ai
    restart: unless-stopped
    # Whisper model sẽ được cache, không cần download lại mỗi lần restart
    volumes:
      - whisper_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"

  # ─────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-client
      dockerfile: Dockerfile
    container_name: english_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  whisper_cache: